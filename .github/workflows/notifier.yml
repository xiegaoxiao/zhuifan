name: anime-notifier

on:
  schedule:
    # ⚠️ GitHub Actions cron 用 UTC 时间，下面时间已减 8 小时转换为 UTC
    # 周一 02:00 UTC = 北京 10:00
    - cron: "0 2 * * 1"       # 仙逆
    # 周二 02:00 UTC = 北京 10:00
    - cron: "0 2 * * 2"       # 吞噬星空
    # 周四 03:00 UTC = 北京 11:00
    - cron: "0 3 * * 4"       # 将夜
    # 周五 02:00 UTC = 北京 10:00
    - cron: "0 2 * * 5"       # 完美世界 + 沧元图
    # 周五 03:00 UTC = 北京 11:00
    - cron: "0 3 * * 5"       # 深空彼岸
    # 周五 04:00 UTC = 北京 12:00
    - cron: "0 4 * * 5"       # 斗罗大陆2
    # 周六 03:00 UTC = 北京 11:00
    - cron: "0 3 * * 6"       # 凡人修仙传
    # 周日 02:00 UTC = 北京 10:00
    - cron: "0 2 * * 0"       # 斗破苍穹
    # 周日 03:00 UTC = 北京 11:00
    - cron: "0 3 * * 0"       # 牧神记
  workflow_dispatch:           # 允许手动触发

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read           # 只需要读 checkout，不需要 write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Ensure config.yaml exists
        run: |
          if [ ! -f config.yaml ]; then
            cp config.example.yaml config.yaml
            echo "::warning::config.yaml was missing — created from example. Edit and commit before next run."
          fi
      - run: python -m anime_notifier
        env:
          WECHAT_SEND_KEY: ${{ secrets.WECHAT_SEND_KEY }}
