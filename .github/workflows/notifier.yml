name: anime-notifier

on:
  schedule:
    # 每 30 分钟触发一次（48 次/天）
    # 原因：GitHub Actions 修改具体 cron 后调度器有 bug（不触发新表达式）
    # 改用通配符 cron 绕过。配合 scheduler ±30 分钟容错，任意 air_time 都能命中
    - cron: "*/30 * * * *"
  workflow_dispatch:           # 允许手动触发

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read           # 只需要读 checkout，不需要 write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Ensure config.yaml exists
        run: |
          if [ ! -f config.yaml ]; then
            cp config.example.yaml config.yaml
            echo "::warning::config.yaml was missing — created from example. Edit and commit before next run."
          fi
      - run: python -m anime_notifier
        env:
          WECHAT_SEND_KEY: ${{ secrets.WECHAT_SEND_KEY }}
