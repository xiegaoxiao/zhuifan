# 追番时间表 —— 工具每部番按 air_time 精确到分钟推送
# weekday 编码：1=周一, 2=周二, ..., 7=周日
# air_time 编码：HH:MM 24小时制
schedule:
  # 周一
  - name: 仙逆
    weekday: 1
    air_time: "10:00"

  # 周二
  - name: 吞噬星空
    weekday: 2
    air_time: "10:00"

  # 周四
  - name: 将夜
    weekday: 4
    air_time: "11:00"

  # 周五
  - name: 完美世界
    weekday: 5
    air_time: "10:00"
  - name: 沧元图 第三季
    weekday: 5
    air_time: "10:00"
  - name: 深空彼岸
    weekday: 5
    air_time: "11:00"
  - name: 斗罗大陆2 绝世唐门
    weekday: 5
    air_time: "12:00"

  # 周六
  - name: 凡人修仙传 年番
    weekday: 6
    air_time: "11:00"

  # 周日
  - name: 斗破苍穹 年番
    weekday: 7
    air_time: "10:00"
  - name: 牧神记
    weekday: 7
    air_time: "11:00"

wechat:
  # ⚠️ 必须用占位符 ${WECHAT_SEND_KEY}，不要直接填真实 SendKey（避免泄露到 git 历史）
  # CI 时会自动从 GitHub Secrets 注入
  send_key: "${WECHAT_SEND_KEY}"
  timezone: "Asia/Shanghai"
