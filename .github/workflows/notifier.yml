name: anime-notifier

on:
  schedule:
    # 周一
    - cron: "0 10 * * 1"      # 仙逆
    # 周二
    - cron: "0 10 * * 2"      # 吞噬星空
    # 周四
    - cron: "0 11 * * 4"      # 将夜
    # 周五
    - cron: "0 10 * * 5"      # 完美世界 + 沧元图
    - cron: "0 11 * * 5"      # 深空彼岸
    - cron: "0 12 * * 5"      # 斗罗大陆2
    # 周六
    - cron: "0 11 * * 6"      # 凡人修仙传
    # 周日
    - cron: "0 10 * * 0"      # 斗破苍穹
    - cron: "0 11 * * 0"      # 牧神记
  workflow_dispatch:           # 允许手动触发

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read           # 只需要读 checkout，不需要 write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Ensure config.yaml exists
        run: |
          if [ ! -f config.yaml ]; then
            cp config.example.yaml config.yaml
            echo "::warning::config.yaml was missing — created from example. Edit and commit before next run."
          fi
      - run: python -m anime_notifier
        env:
          WECHAT_SEND_KEY: ${{ secrets.WECHAT_SEND_KEY }}
